<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
    <h1 class="text-center">Import Data</h1>
    <h3 class="text-center">This is the import data page.</h3>

    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <form action="{% url "import_data" %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label for="file_path">Upload CSV File</label>
                    <input type="file" name="file_path" class="form-control" id="file_path">
                </div>

                <div class="form-group">
                    <label for="model_name">Select database Table</label>
                    <select name="model_name" class="form-control">
                        <option value="" disabled selected>-- Select a table --</option>
                        <option value="">MyModel</option>
                    </select>
                </div>

                <input type="submit" value="Import Data" class="btn btn-primary btn-block">
            </form>
        </div>
    </div>
</div>
</body>
</html>
