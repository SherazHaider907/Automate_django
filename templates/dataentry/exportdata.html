{% extends 'base.html' %}

{% block title %}Export Data{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-center">
            <i class="bi bi-download text-success me-2"></i> Export Data
        </h2>
        <p class="text-muted">Download your database as CSV</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4">

                    <form action="{% url 'export_data' %}" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Select Database Table</label>
                            <select name="model_name" class="form-select">
                                <option value="" disabled selected>-- Select a table --</option>
                                {% for model in custom_models %}
                                    <option value="{{ model }}">{{ model }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Export Data
                        </button>

                        <div class="mt-3">
                            {% include "alerts.html" %}
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
