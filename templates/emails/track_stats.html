{% extends "base.html" %}

{% block content %}

<div class="container">
    <h2 class= "test-center p-5">Email Statistics</h2>
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <div class="row">
                        <div class="col-md-6">
                            Total Emails Send: <b>0</b> <br>
                            sent at : <b>{{ email.send_at }}</b>
                        </div>
                        <div class="col-md-6 text-end">
                            Opended: <b>0%</b> <br>
                            Clicked : <b>0%</b>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <h4>{{ email.subject }}</h4>
                    <div class="mail-body">
                        {{ email.body | safe }}
                    </div>
                    {% if email.attachment %}
                        <div class="attachment">
                            <img src="{{ email.attachment.url }}" alt="Email Attachment" width = "100%">
                        </div>
                    {% else %}
                        <div class="no-attachment">
                            NO Attachment
                        </div>
                    {% endif %}
                </div>
                </div>
        </div>
    </div>
</div>

{% endblock content %}
