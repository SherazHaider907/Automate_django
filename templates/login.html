{% extends "base.html" %}


{% block content %}
{% load crispy_forms_tags %}

<div class="container mt-5" style="max-width:600px;">
    <h2 class="text-center mb-4">Login</h2>
    
    <form action="{% url "login" %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            {{ form|crispy }}
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-success">
            Login
        </button>
        </div>
    </form>
</div>
{% endblock content %}
